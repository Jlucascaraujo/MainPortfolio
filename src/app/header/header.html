<div id="header">
    <div id="mainTitle" class="header-element">
        <h1>{{ 'mainTitle' | translate }}</h1>
        <h2>{{ 'mainSubtitle' | translate }}</h2>
    </div>
    <div id="langSwitcher" class="header-element">
        <h2>{{ 'langSwitch' | translate }}</h2>
        <p>{{ 'langSwitchText' | translate }}</p>
        <button (click)="useLanguage('pt')">pt</button>
        <button (click)="useLanguage('en')">en</button>
        <button (click)="useLanguage('es')">es</button>
    </div>
</div>
