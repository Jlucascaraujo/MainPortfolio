name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Versão estável para o Angular 21

      - name: Install dependencies
        run: npm ci

      - name: Build project
        # Importante: o base-href garante que os assets carreguem no GitHub Pages
        run: npx ng build --configuration production --base-href /

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Usando o caminho que você encontrou:
          path: ./dist/jogandoOMachado/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4